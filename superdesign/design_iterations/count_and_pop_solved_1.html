<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Count &amp; Pop — Level Solved</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #FBF3E6; --canvas2: #F6EAD7; --surface: #FFFFFF;
    --ink: #3B3026; --ink-soft: #8C8073; --line2: rgba(59,48,38,0.14);
    --pink: #F58FB8; --pink-deep: #E66FA0; --pink-tint: #FCE5EF;
    --gold: #F6C747; --green: #6FC27B;
    --shadow: rgba(74,52,28,0.16);
    --display: 'Fredoka', sans-serif; --body: 'Nunito', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--body); background: var(--canvas2);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 16px; color: var(--ink);
  }
  .phone {
    position: relative; width: 390px; min-height: 760px;
    background: var(--canvas); border-radius: 44px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(74,52,28,0.28), 0 4px 0 #fff inset;
    display: flex; flex-direction: column;
    background-image: radial-gradient(circle at 1px 1px, rgba(59,48,38,0.04) 1px, transparent 0);
    background-size: 22px 22px;
  }
  /* faint board behind the dim, to show overlay sits on top */
  .board-behind {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 18px; padding: 110px 28px; align-content: center;
    filter: blur(1px);
  }
  .board-behind .o {
    aspect-ratio: 1; border-radius: 26px; background: var(--surface);
    display: grid; place-items: center; font-size: 40px; opacity: 0.9;
    box-shadow: 0 5px 0 var(--line2);
  }
  /* dim veil */
  .dim {
    position: absolute; inset: 0;
    background: rgba(59, 48, 38, 0.42);
    backdrop-filter: blur(2px);
  }
  /* falling confetti */
  .confetti {
    position: absolute; top: -20px; width: 11px; height: 16px; border-radius: 3px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(820px) rotate(540deg); opacity: 0.8; }
  }

  /* celebration card */
  .card {
    position: relative;
    z-index: 5;
    margin: auto;
    width: 320px;
    background: var(--surface);
    border-radius: 34px;
    padding: 36px 28px 30px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(74,52,28,0.4);
    border: 3px solid #fff;
    animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardIn {
    0% { transform: scale(0.7) translateY(20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* trophy in pink EmojiFrame */
  .emoji-frame {
    width: 96px; height: 96px;
    margin: 0 auto 6px;
    border-radius: 28px;
    background: var(--pink-tint);
    display: grid; place-items: center;
    font-size: 52px;
    box-shadow: inset 0 0 0 3px #fff, 0 8px 18px rgba(230,111,160,0.25);
    animation: trophyBob 1.8s ease-in-out infinite;
  }
  @keyframes trophyBob { 0%,100%{ transform: translateY(0) rotate(-4deg);} 50%{ transform: translateY(-6px) rotate(4deg);} }

  .stars { display: flex; justify-content: center; gap: 8px; margin: 12px 0 6px; }
  .stars .s {
    color: var(--gold); font-size: 38px; line-height: 1;
    filter: drop-shadow(0 3px 4px rgba(246,199,71,0.5));
    animation: starPop 0.5s ease backwards;
  }
  .stars .s:nth-child(1){ animation-delay: 0.25s; }
  .stars .s:nth-child(2){ animation-delay: 0.4s; font-size: 46px; }
  .stars .s:nth-child(3){ animation-delay: 0.55s; }
  @keyframes starPop { 0%{ transform: scale(0) rotate(-40deg); opacity:0;} 70%{ transform: scale(1.25);} 100%{ transform: scale(1); opacity: 1;} }

  .card h1 { font-family: var(--display); font-weight: 700; font-size: 30px; color: var(--ink); margin-bottom: 4px; }
  .card p { font-family: var(--body); font-weight: 700; font-size: 15px; color: var(--ink-soft); margin-bottom: 22px; }
  .card p b { color: var(--pink-deep); }

  .next-btn {
    display: inline-flex; align-items: center; gap: 8px;
    width: 100%;
    justify-content: center;
    padding: 18px;
    border: none;
    border-radius: 22px;
    background: var(--pink);
    color: #fff;
    font-family: var(--display);
    font-weight: 700;
    font-size: 21px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--pink-deep), 0 12px 22px rgba(230,111,160,0.4);
    transition: transform 0.12s ease;
  }
  .next-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--pink-deep); }

  .caption {
    position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
    font-family: var(--display); font-weight: 600; font-size: 13px; color: #fff;
    letter-spacing: 0.4px; z-index: 6; opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="phone">
    <!-- blurred board behind -->
    <div class="board-behind">
      <div class="o">🍎</div><div class="o">🍎</div><div class="o">🍎</div>
      <div class="o">🍎</div><div class="o">🍎</div><div class="o">🍎</div>
    </div>

    <div class="dim"></div>

    <!-- confetti -->
    <div class="confetti" style="left:12%;  background:var(--pink);  animation-duration:2.4s;"></div>
    <div class="confetti" style="left:28%;  background:var(--gold);  animation-duration:3.1s; animation-delay:.3s;"></div>
    <div class="confetti" style="left:46%;  background:var(--green); animation-duration:2.7s; animation-delay:.6s;"></div>
    <div class="confetti" style="left:64%;  background:var(--pink-deep); animation-duration:3.4s; animation-delay:.2s;"></div>
    <div class="confetti" style="left:80%;  background:var(--gold);  animation-duration:2.6s; animation-delay:.5s;"></div>
    <div class="confetti" style="left:90%;  background:var(--green); animation-duration:3.0s; animation-delay:.1s;"></div>

    <!-- celebration card -->
    <div class="card">
      <div class="emoji-frame">🏆</div>
      <div class="stars">
        <span class="s">★</span>
        <span class="s">★</span>
        <span class="s">★</span>
      </div>
      <h1>Great job!</h1>
      <p>You counted to <b>5</b>! 🎉</p>
      <button class="next-btn">Next ›</button>
    </div>

    <div class="caption">LEVEL SOLVED · trophy + 3 stars overlay</div>
  </div>
</body>
</html>
