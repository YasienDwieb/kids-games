<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Letter Land — Trace it</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #FBF3E6; --canvas2: #F6EAD7; --surface: #FFFFFF;
    --ink: #3B3026; --ink-soft: #8C8073; --line2: rgba(59, 48, 38, 0.14);
    --blue: #5CB8E4; --blue-deep: #3A9FD1; --blue-tint: #E0F2FB;
    --gold: #F6C747; --green: #6FC27B; --green-deep: #54A862;
    --shadow: rgba(74, 52, 28, 0.16);
    --display: 'Fredoka', sans-serif; --body: 'Nunito', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--body); background: var(--canvas2); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 40px 16px; color: var(--ink);
  }
  .phone {
    position: relative; width: 390px; min-height: 760px; background: var(--canvas);
    border-radius: 44px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(74, 52, 28, 0.28), 0 4px 0 #fff inset;
    display: flex; flex-direction: column;
    background-image: radial-gradient(circle at 1px 1px, rgba(59,48,38,0.04) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .hud { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 8px; }
  .hud-btn {
    width: 46px; height: 46px; border-radius: 16px; background: var(--surface); border: none;
    display: grid; place-items: center; font-size: 22px; color: var(--ink);
    box-shadow: 0 3px 0 var(--line2), 0 6px 14px var(--shadow); cursor: pointer;
  }
  .hud-title { font-family: var(--display); font-weight: 600; font-size: 19px; }
  .score-pill {
    display: flex; align-items: center; gap: 6px; background: var(--surface);
    padding: 9px 15px; border-radius: 20px;
    box-shadow: 0 3px 0 var(--line2), 0 6px 14px var(--shadow);
    font-family: var(--display); font-weight: 600; font-size: 16px;
  }
  .score-pill .star { color: var(--gold); font-size: 15px; }

  .prompt {
    margin: 16px 20px 4px; background: linear-gradient(160deg, #fff, var(--blue-tint));
    border-radius: 28px; padding: 18px 22px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 6px 0 var(--blue-tint), 0 14px 26px rgba(58, 159, 209, 0.18); border: 2px solid #fff;
  }
  .prompt .mini-speaker {
    width: 58px; height: 58px; border-radius: 20px; background: var(--blue); color: #fff;
    display: grid; place-items: center; font-size: 26px; border: none; cursor: pointer;
    box-shadow: 0 5px 0 var(--blue-deep), 0 10px 18px rgba(58,159,209,0.4); flex-shrink: 0;
  }
  .prompt-text small {
    display: block; font-family: var(--body); font-weight: 800; font-size: 12px;
    color: var(--ink-soft); letter-spacing: 0.6px; margin-bottom: 3px;
  }
  .prompt-text .big { font-family: var(--display); font-weight: 600; font-size: 22px; }
  .prompt-text .big b { color: var(--blue-deep); }

  /* trace stage */
  .stage { flex: 1; display: grid; place-items: center; padding: 8px 24px 30px; }
  .canvas {
    position: relative; width: 280px; height: 320px;
    background: var(--surface); border-radius: 36px; border: 3px solid #fff;
    box-shadow: 0 8px 0 var(--line2), 0 16px 30px var(--shadow);
    display: grid; place-items: center; overflow: visible;
  }
  /* faint full letter behind */
  .ghost {
    position: absolute; font-family: var(--display); font-weight: 700; font-size: 250px;
    color: var(--blue-tint); line-height: 1; user-select: none;
  }
  /* the SVG trace path on top of the ghost */
  svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .guide { fill: none; stroke: var(--blue); stroke-width: 16; stroke-linecap: round;
           stroke-dasharray: 2 26; opacity: 0.55; }
  .traced { fill: none; stroke: var(--green); stroke-width: 18; stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(111,194,123,0.6)); }
  /* start dot */
  .start-dot { fill: var(--coral, #F47C6E); }
  .start-label { font-family: var(--display); font-weight: 700; font-size: 22px; fill: #fff; }

  /* finger */
  .finger {
    position: absolute; font-size: 52px; left: 150px; top: 150px;
    transform: rotate(-18deg); filter: drop-shadow(0 6px 8px var(--shadow));
    animation: drift 2.6s ease-in-out infinite;
  }
  @keyframes drift {
    0%,100% { transform: translate(0,0) rotate(-18deg); }
    50% { transform: translate(6px,-8px) rotate(-12deg); }
  }
  .tip {
    text-align: center; margin: 0 24px 4px; font-family: var(--display);
    font-weight: 600; font-size: 17px; color: var(--ink-soft);
  }
  .caption {
    position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
    font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="hud">
      <button class="hud-btn" aria-label="Back">‹</button>
      <div class="hud-title">Letter Land</div>
      <div class="score-pill"><span class="star">★</span> 70</div>
    </div>

    <div class="prompt">
      <button class="mini-speaker" aria-label="Hear the letter">🔊</button>
      <div class="prompt-text">
        <small>NOW TRACE IT</small>
        <span class="big">Trace the letter <b>C</b></span>
      </div>
    </div>

    <div class="tip">Follow the dots with your finger ✏️</div>

    <div class="stage">
      <div class="canvas">
        <div class="ghost">C</div>
        <svg viewBox="0 0 280 320" aria-hidden="true">
          <!-- the full C guide path (dotted) -->
          <path class="guide" d="M205 95 A85 95 0 1 0 205 225" />
          <!-- the portion already traced (glowing green), top arc -->
          <path class="traced" d="M205 95 A85 95 0 0 0 70 130" />
          <!-- start dot -->
          <circle class="start-dot" cx="205" cy="95" r="22" />
          <text class="start-label" x="205" y="103" text-anchor="middle">1</text>
        </svg>
        <div class="finger">👆</div>
      </div>
    </div>

    <div class="caption">TRACE IT · dotted guide + glowing traced arc + finger mid-trace</div>
  </div>
</body>
</html>
