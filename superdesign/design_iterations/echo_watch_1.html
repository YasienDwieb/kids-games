<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Echo — Watch / Playback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF9F0; --cream-2:#FCEFD9; --ink:#3A2E2A; --ink-soft:#7A6B63;
    --blue:#3FA7E0; --blue-deep:#1E7FBE;
    --orange:#F39A41; --orange-deep:#D97B1B;
    --gold:#F6C747; --gold-deep:#D9A218;
    --violet:#9B82E6; --violet-deep:#6F54C9;
    --shadow: 0 10px 0 rgba(58,46,42,.12), 0 18px 30px rgba(58,46,42,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;min-height:100vh;color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%,#FFFDF8 0%,var(--cream) 45%,var(--cream-2) 100%);
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .phone{width:390px;height:818px;background:var(--cream);border-radius:46px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(58,46,42,.06);}
  /* during WATCH, a soft spotlight vignette darkens the whole stage */
  .phone::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(420px 420px at 26% 40%, rgba(255,255,255,0) 0%, rgba(58,46,42,.16) 70%, rgba(58,46,42,.28) 100%);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 6px;position:relative;z-index:2;}
  .back{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink);box-shadow:0 4px 0 rgba(58,46,42,.10),0 8px 16px rgba(58,46,42,.10);}
  .title{font-family:'Fredoka';font-weight:700;font-size:26px}.title .dot{color:var(--blue)}
  .spacer{width:46px}
  .hud{display:flex;gap:12px;justify-content:center;padding:8px 22px 4px;position:relative;z-index:2;}
  .pill{display:flex;align-items:center;gap:8px;background:#fff;border-radius:22px;padding:9px 16px;box-shadow:0 5px 0 rgba(58,46,42,.08),0 10px 18px rgba(58,46,42,.10);}
  .pill .k{font-weight:700;color:var(--ink-soft);font-size:13px;text-transform:uppercase;letter-spacing:.6px}
  .pill .v{font-family:'Fredoka';font-weight:700;color:var(--ink);font-size:20px}
  .pill .v.gold{color:var(--gold-deep)}
  /* WATCH phase banner — calm dark pill with eyes */
  .phase{margin:18px auto 6px;display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;border-radius:26px;padding:12px 24px;font-family:'Fredoka';font-weight:600;font-size:19px;box-shadow:0 8px 0 rgba(58,46,42,.18),0 14px 26px rgba(58,46,42,.22);position:relative;z-index:2;}
  .phase .emo{font-size:22px}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 26px 60px;position:relative;z-index:2;}
  .board{position:relative;width:316px;height:316px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:18px;}
  .pad{border-radius:34px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:var(--shadow);}
  .pad svg{width:64px;height:64px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));}
  .pad .glyph{color:#fff}
  /* DIMMED state during watch: desaturated + darkened, no shadow lift */
  .pad.dim{filter:saturate(.35) brightness(.62);box-shadow:0 4px 0 rgba(58,46,42,.06);}
  .pad.blue{background:linear-gradient(160deg,var(--blue),var(--blue-deep));}
  .pad.orange{background:linear-gradient(160deg,var(--orange),var(--orange-deep));}
  .pad.gold{background:linear-gradient(160deg,var(--gold),var(--gold-deep));}
  .pad.violet{background:linear-gradient(160deg,var(--violet),var(--violet-deep));}
  /* ACTIVE pad mid-blink: lightened, full saturation, big pop, glow halo */
  .pad.active{
    transform:scale(1.18);
    filter:saturate(1.25) brightness(1.28);
    z-index:5;
    box-shadow:
      0 0 0 6px rgba(255,255,255,.9),
      0 0 34px 10px var(--blue),
      0 0 70px 26px rgba(63,167,224,.65),
      0 18px 28px rgba(58,46,42,.28);
  }
  .pad.active svg{width:72px;height:72px;filter:drop-shadow(0 0 10px rgba(255,255,255,.9));}
  .hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;background:var(--cream);box-shadow:0 6px 0 rgba(58,46,42,.12),0 12px 22px rgba(58,46,42,.16);display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid #fff;}
  /* progress dots under hub showing sequence position */
  .seq{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
  .seq i{width:11px;height:11px;border-radius:50%;background:rgba(58,46,42,.18);}
  .seq i.on{background:var(--blue);box-shadow:0 0 10px var(--blue);}
  .label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-weight:800;z-index:3;opacity:.7}
</style>
</head>
<body>
  <div class="phone">
    <div class="topbar"><div class="back">‹</div><div class="title">Echo<span class="dot">.</span></div><div class="spacer"></div></div>
    <div class="hud">
      <div class="pill"><span class="k">Round</span><span class="v">4</span></div>
      <div class="pill"><span class="k">Best</span><span class="v gold">7</span></div>
    </div>
    <div class="phase"><span class="emo">👀</span> Watch carefully…</div>
    <div class="stage">
      <div class="board">
        <!-- blue / star — ACTIVE (mid-blink) -->
        <div class="pad blue active">
          <span class="glyph"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.6 1.1 6.45L12 17.9l-5.8 3.05 1.1-6.45-4.7-4.6 6.5-.95z"/></svg></span>
        </div>
        <div class="pad orange dim">
          <span class="glyph"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.3-4.6-9.7-9.2C.8 8.4 2.3 5 5.6 5c2 0 3.3 1.1 4.4 2.6C11.1 6.1 12.4 5 14.4 5c3.3 0 4.8 3.4 3.3 6.8C19.3 16.4 12 21 12 21z"/></svg></span>
        </div>
        <div class="pad gold dim">
          <span class="glyph"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8.5"/></svg></span>
        </div>
        <div class="pad violet dim">
          <span class="glyph"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="4.5"/></svg></span>
        </div>
        <div class="hub">🎵</div>
        <div class="seq"><i class="on"></i><i></i><i></i><i></i></div>
      </div>
    </div>
    <div class="label">Echo · Watch (blue pad mid-blink, others dimmed)</div>
  </div>
</body>
</html>
