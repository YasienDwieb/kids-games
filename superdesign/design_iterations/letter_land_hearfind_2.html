<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Letter Land — Hear &amp; Find (hero + row)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #FBF3E6; --canvas2: #F6EAD7; --surface: #FFFFFF;
    --ink: #3B3026; --ink-soft: #8C8073; --line2: rgba(59, 48, 38, 0.14);
    --blue: #5CB8E4; --blue-deep: #3A9FD1; --blue-tint: #E0F2FB;
    --gold: #F6C747; --green: #6FC27B; --green-deep: #54A862;
    --shadow: rgba(74, 52, 28, 0.16);
    --display: 'Fredoka', sans-serif; --body: 'Nunito', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--body); background: var(--canvas2); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 40px 16px; color: var(--ink);
  }
  .phone {
    position: relative; width: 390px; min-height: 760px;
    background: var(--canvas); border-radius: 44px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(74, 52, 28, 0.28), 0 4px 0 #fff inset;
    display: flex; flex-direction: column;
    background-image: radial-gradient(circle at 1px 1px, rgba(59,48,38,0.04) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .hud { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 8px; }
  .hud-btn {
    width: 46px; height: 46px; border-radius: 16px; background: var(--surface); border: none;
    display: grid; place-items: center; font-size: 22px; color: var(--ink);
    box-shadow: 0 3px 0 var(--line2), 0 6px 14px var(--shadow); cursor: pointer;
  }
  .hud-title { font-family: var(--display); font-weight: 600; font-size: 19px; }
  .score-pill {
    display: flex; align-items: center; gap: 6px; background: var(--surface);
    padding: 9px 15px; border-radius: 20px;
    box-shadow: 0 3px 0 var(--line2), 0 6px 14px var(--shadow);
    font-family: var(--display); font-weight: 600; font-size: 16px;
  }
  .score-pill .star { color: var(--gold); font-size: 15px; }

  /* hero speaker block — the listening moment is the star */
  .hero { display: flex; flex-direction: column; align-items: center; padding: 28px 24px 8px; }
  .hero small {
    font-family: var(--body); font-weight: 800; font-size: 12px; color: var(--ink-soft);
    letter-spacing: 0.7px; margin-bottom: 18px;
  }
  .big-speaker {
    width: 150px; height: 150px; border-radius: 46px;
    background: linear-gradient(160deg, var(--blue), var(--blue-deep));
    color: #fff; display: grid; place-items: center; font-size: 70px; cursor: pointer; border: none;
    box-shadow: 0 10px 0 var(--blue-deep), 0 22px 40px rgba(58,159,209,0.45);
    position: relative; animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.04);} }
  .big-speaker::before, .big-speaker::after {
    content: ''; position: absolute; inset: -10px; border-radius: 56px;
    border: 5px solid var(--blue); opacity: 0; animation: wave 2.2s ease-out infinite;
  }
  .big-speaker::after { animation-delay: 1.1s; }
  @keyframes wave { 0%{ transform: scale(0.85); opacity: 0.7;} 100%{ transform: scale(1.45); opacity: 0;} }
  .hero .tap { margin-top: 18px; font-family: var(--display); font-weight: 600; font-size: 17px; color: var(--ink-soft); }

  .which {
    text-align: center; margin: 12px 24px 0;
    font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--ink);
  }

  /* horizontal row of 3 big tiles */
  .row { flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 18px 22px 34px; }
  .letter {
    flex: 1; aspect-ratio: 0.82; border-radius: 28px; background: var(--surface);
    display: grid; place-items: center; font-family: var(--display); font-weight: 700;
    font-size: 64px; color: var(--ink); border: 3px solid #fff;
    box-shadow: 0 6px 0 var(--line2), 0 12px 22px var(--shadow);
    cursor: pointer; position: relative; transition: transform 0.12s ease;
  }
  .letter:active { transform: translateY(4px) scale(0.97); }
  .letter.correct {
    background: var(--green); color: #fff; border-color: #fff;
    box-shadow: 0 6px 0 var(--green-deep), 0 14px 26px rgba(84,168,98,0.45);
  }
  .letter.correct::after {
    content: '✓'; position: absolute; top: -12px; right: -8px; width: 38px; height: 38px;
    border-radius: 50%; background: var(--gold); color: #fff; display: grid; place-items: center;
    font-size: 20px; box-shadow: 0 4px 10px var(--shadow);
  }
  .caption {
    position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
    font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="hud">
      <button class="hud-btn" aria-label="Back">‹</button>
      <div class="hud-title">Letter Land</div>
      <div class="score-pill"><span class="star">★</span> 60</div>
    </div>

    <div class="hero">
      <small>LISTEN…</small>
      <button class="big-speaker" aria-label="Hear the letter">🔊</button>
      <div class="tap">Tap to hear it again</div>
    </div>

    <div class="which">Which letter is it?</div>

    <div class="row">
      <div class="letter">C</div>
      <div class="letter correct">B</div>
      <div class="letter">R</div>
    </div>

    <div class="caption">HEAR &amp; FIND · hero speaker + row of 3 · (AR shows أ / ب / ت)</div>
  </div>
</body>
</html>
